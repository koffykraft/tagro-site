<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAGRO Service — Setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #111111;
    --white: #ffffff;
    --orange: #E85C0D;
    --gray-1: #f5f5f5;
    --gray-2: #e0e0e0;
    --gray-3: #999999;
    --green: #2d7a3a;
    --red: #c0392b;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--gray-1);
    color: var(--black);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: var(--black);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo {
    font-size: 18px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  header .logo span { color: var(--orange); }

  header .page-title {
    font-size: 13px;
    color: var(--gray-3);
    margin-left: auto;
  }

  nav {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--gray-2);
    overflow-x: auto;
  }

  nav a {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-3);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
  }

  nav a.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }

  .section {
    background: var(--white);
    margin: 12px 16px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--gray-2);
  }

  .section-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--gray-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .section-header h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--black);
  }

  .section-header small {
    font-size: 11px;
    color: var(--gray-3);
  }

  .field {
    padding: 14px 16px;
    border-bottom: 1px solid var(--gray-1);
  }

  .field:last-child { border-bottom: none; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gray-2);
    border-radius: 6px;
    font-size: 15px;
    font-family: var(--font);
    background: var(--white);
    color: var(--black);
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--orange);
  }

  .field textarea { min-height: 80px; resize: vertical; }

  /* Token setup */
  .token-field input {
    font-family: monospace;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .token-status {
    margin-top: 8px;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 5px;
    display: none;
  }

  .token-status.ok { background: #e8f5e9; color: var(--green); display: block; }
  .token-status.err { background: #fdecea; color: var(--red); display: block; }

  /* Staff list */
  .staff-list { padding: 8px 16px 4px; }

  .staff-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-1);
  }

  .staff-item:last-child { border-bottom: none; }

  .staff-item input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--gray-2);
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
  }

  .staff-item input:focus {
    outline: none;
    border-color: var(--orange);
  }

  .btn-remove {
    width: 28px;
    height: 28px;
    border: none;
    background: #fdecea;
    color: var(--red);
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-add {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--gray-2);
    background: none;
    color: var(--orange);
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    margin: 8px 0 12px;
  }

  /* Labour charges */
  .charge-item {
    display: grid;
    grid-template-columns: 1fr auto 80px auto;
    gap: 8px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-1);
  }

  .charge-item:last-child { border-bottom: none; }

  .charge-item input {
    padding: 8px 10px;
    border: 1px solid var(--gray-2);
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font);
  }

  .charge-item input:focus {
    outline: none;
    border-color: var(--orange);
  }

  .charge-item .rupee {
    font-size: 13px;
    color: var(--gray-3);
    font-weight: 600;
  }

  /* Save button */
  .save-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-2);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  .btn-save {
    width: 100%;
    padding: 14px;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
  }

  .btn-save:active { opacity: 0.85; }

  .btn-test {
    width: 100%;
    padding: 11px;
    background: none;
    color: var(--black);
    border: 1px solid var(--gray-2);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--black);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }

  .branch-tag {
    display: inline-block;
    background: var(--orange);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .info-text {
    font-size: 12px;
    color: var(--gray-3);
    padding: 10px 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <img src="../assets/logos/tagro-logo.png" alt="TAGRO" style="height:28px;">
  <div class="page-title">Setup</div>
</header>

<nav>
  <a href="index.html">Job Card</a>
  <a href="tracker.html">Tracker</a>
  <a href="config.html" class="active">Setup</a>
</nav>

<!-- Dropbox Connection -->
<div class="section">
  <div class="section-header">
    <h2>Dropbox Connection</h2>
    <small id="connection-badge">Not connected</small>
  </div>
  <div class="field token-field">
    <label>Access Token</label>
    <input type="password" id="dbx-token" placeholder="Paste your Dropbox token here">
    <div class="token-status" id="token-status"></div>
  </div>
  <div class="field">
    <button class="btn-test" onclick="testConnection()">Test Connection</button>
  </div>
</div>

<!-- Branch -->
<div class="section">
  <div class="section-header">
    <h2>This Branch</h2>
  </div>
  <div class="field">
    <label>Branch Code</label>
    <select id="branch-code">
      <option value="">Select branch</option>
      <option value="KVR">KVR — Karavaloor</option>
      <option value="NDD">NDD — Nedumangad</option>
      <option value="PKM">PKM — Ponkunnam</option>
      <option value="OYR">OYR — Oyoor</option>
      <option value="SDM">SDM — Sadanandapuram</option>
      <option value="MDM">MDM — Marthandam</option>
      <option value="SKT">SKT — Shencottai</option>
    </select>
  </div>
  <div class="field">
    <label>Branch Phone</label>
    <input type="tel" id="branch-phone" placeholder="e.g. 0475-2253172">
  </div>
</div>

<!-- Staff -->
<div class="section">
  <div class="section-header">
    <h2>Staff Names</h2>
    <small>Shown in dropdowns</small>
  </div>
  <div class="staff-list" id="staff-list"></div>
  <div style="padding: 0 16px;">
    <button class="btn-add" onclick="addStaff()">+ Add Staff Member</button>
  </div>
</div>

<!-- Labour Charges -->
<div class="section">
  <div class="section-header">
    <h2>Labour Charges</h2>
    <small>Default rates</small>
  </div>
  <p class="info-text">Set your standard charges. Staff can adjust per job if needed.</p>
  <div style="padding: 0 16px;" id="charges-list"></div>
  <div style="padding: 0 16px;">
    <button class="btn-add" onclick="addCharge()">+ Add Service Type</button>
  </div>
</div>

<!-- Save -->
<div class="save-bar">
  <button class="btn-save" onclick="saveConfig()">Save Configuration</button>
</div>

<div class="toast" id="toast"></div>

<script>
const BRANCHES = {
  KVR: 'Karavaloor', NDD: 'Nedumangad', PKM: 'Ponkunnam',
  OYR: 'Oyoor', SDM: 'Sadanandapuram', MDM: 'Marthandam', SKT: 'Shencottai'
};

const DEFAULT_CHARGES = [
  { name: 'Full Service', amount: 3000 },
  { name: 'Carburetor Service', amount: 300 },
  { name: 'Carburetor Repairs', amount: 500 },
  { name: 'Clutch Assembly Replacement', amount: 250 },
  { name: 'Piston Replaced', amount: 500 },
];

function getToken() { return localStorage.getItem('dbx_token') || ''; }
function getConfig() {
  try { return JSON.parse(localStorage.getItem('tagro_config') || '{}'); } catch { return {}; }
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function renderStaff(names = []) {
  const list = document.getElementById('staff-list');
  list.innerHTML = '';
  (names.length ? names : ['']).forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'staff-item';
    div.innerHTML = `
      <input type="text" placeholder="Staff name" value="${name}" data-staff="${i}">
      <button class="btn-remove" onclick="removeStaff(${i})">×</button>
    `;
    list.appendChild(div);
  });
}

function addStaff() {
  const inputs = document.querySelectorAll('[data-staff]');
  const names = [...inputs].map(i => i.value.trim());
  names.push('');
  renderStaff(names);
  const newInputs = document.querySelectorAll('[data-staff]');
  newInputs[newInputs.length - 1].focus();
}

function removeStaff(idx) {
  const inputs = document.querySelectorAll('[data-staff]');
  const names = [...inputs].map(i => i.value.trim()).filter((_, i) => i !== idx);
  renderStaff(names.length ? names : ['']);
}

function renderCharges(charges = DEFAULT_CHARGES) {
  const list = document.getElementById('charges-list');
  list.innerHTML = '';
  charges.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'charge-item';
    div.innerHTML = `
      <input type="text" placeholder="Service name" value="${ch.name}" data-charge-name="${i}">
      <span class="rupee">₹</span>
      <input type="number" placeholder="0" value="${ch.amount}" data-charge-amt="${i}" style="text-align:right;">
      <button class="btn-remove" onclick="removeCharge(${i})">×</button>
    `;
    list.appendChild(div);
  });
}

function addCharge() {
  const names = [...document.querySelectorAll('[data-charge-name]')].map(i => i.value);
  const amts = [...document.querySelectorAll('[data-charge-amt]')].map(i => parseInt(i.value) || 0);
  const charges = names.map((n, i) => ({ name: n, amount: amts[i] }));
  charges.push({ name: '', amount: 0 });
  renderCharges(charges);
}

function removeCharge(idx) {
  const names = [...document.querySelectorAll('[data-charge-name]')].map(i => i.value);
  const amts = [...document.querySelectorAll('[data-charge-amt]')].map(i => parseInt(i.value) || 0);
  const charges = names.map((n, i) => ({ name: n, amount: amts[i] })).filter((_, i) => i !== idx);
  renderCharges(charges.length ? charges : [{ name: '', amount: 0 }]);
}

async function testConnection() {
  const token = document.getElementById('dbx-token').value.trim();
  if (!token) { showToast('Paste your token first'); return; }
  const status = document.getElementById('token-status');
  const badge = document.getElementById('connection-badge');
  try {
    const res = await fetch('https://api.dropboxapi.com/2/users/get_current_account', {
      method: 'POST', headers: { Authorization: `Bearer ${token}` }
    });
    if (res.ok) {
      const data = await res.json();
      status.className = 'token-status ok';
      status.textContent = `Connected as ${data.name.display_name}`;
      badge.textContent = 'Connected';
      badge.style.color = '#2d7a3a';
      localStorage.setItem('dbx_token', token);
      showToast('Dropbox connected');
    } else {
      status.className = 'token-status err';
      status.textContent = 'Invalid token. Generate a new one from the Dropbox developer console.';
      badge.textContent = 'Not connected';
      badge.style.color = '#c0392b';
    }
  } catch (e) {
    status.className = 'token-status err';
    status.textContent = 'Connection failed. Check your internet.';
  }
}

async function saveToDropbox(branch, config) {
  const token = getToken();
  if (!token) return;
  const path = `/TAGRO-Service/${branch}/config.json`;
  await fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': JSON.stringify({ path, mode: 'overwrite', autorename: false })
    },
    body: JSON.stringify(config, null, 2)
  });
}

function saveConfig() {
  const token = document.getElementById('dbx-token').value.trim();
  const branch = document.getElementById('branch-code').value;
  const phone = document.getElementById('branch-phone').value.trim();

  if (!branch) { showToast('Select a branch first'); return; }
  if (!token && !getToken()) { showToast('Test Dropbox connection first'); return; }

  if (token) localStorage.setItem('dbx_token', token);

  const staffNames = [...document.querySelectorAll('[data-staff]')]
    .map(i => i.value.trim()).filter(Boolean);

  const chargeNames = [...document.querySelectorAll('[data-charge-name]')].map(i => i.value.trim());
  const chargeAmts = [...document.querySelectorAll('[data-charge-amt]')].map(i => parseInt(i.value) || 0);
  const charges = chargeNames.map((n, i) => ({ name: n, amount: chargeAmts[i] })).filter(c => c.name);

  const config = {
    branch,
    branchName: BRANCHES[branch],
    phone,
    staff: staffNames,
    charges,
    savedAt: new Date().toISOString(),
    formVersion: '1.0'
  };

  localStorage.setItem('tagro_config', JSON.stringify(config));
  saveToDropbox(branch, config)
    .then(() => showToast('Saved to Dropbox'))
    .catch(() => showToast('Saved locally (Dropbox sync failed)'));
}

// Load saved values
function loadSaved() {
  const token = getToken();
  if (token) {
    document.getElementById('dbx-token').value = token;
    document.getElementById('connection-badge').textContent = 'Token saved';
  }
  const cfg = getConfig();
  if (cfg.branch) document.getElementById('branch-code').value = cfg.branch;
  if (cfg.phone) document.getElementById('branch-phone').value = cfg.phone;
  renderStaff(cfg.staff || []);
  renderCharges(cfg.charges || DEFAULT_CHARGES);
}

loadSaved();
</script>
</body>
</html>
