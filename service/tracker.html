<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAGRO Service — Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #111111;
    --white: #ffffff;
    --orange: #E85C0D;
    --gray-1: #f5f5f5;
    --gray-2: #e0e0e0;
    --gray-3: #999999;
    --green: #2d7a3a;
    --red: #c0392b;
    --amber: #d97706;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--gray-1);
    color: var(--black);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    background: var(--black);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo { font-size: 18px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
  header .logo span { color: var(--orange); }

  nav {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--gray-2);
  }

  nav a {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-3);
    text-decoration: none;
    border-bottom: 3px solid transparent;
  }

  nav a.active { color: var(--orange); border-bottom-color: var(--orange); }

  .search-bar {
    padding: 12px 16px;
    background: var(--white);
    border-bottom: 1px solid var(--gray-2);
  }

  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--gray-2);
    border-radius: 8px;
    font-size: 15px;
    font-family: var(--font);
    background: var(--gray-1);
  }

  .search-bar input:focus { outline: none; border-color: var(--orange); background: var(--white); }

  .filter-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
  }

  .filter-chip {
    flex-shrink: 0;
    padding: 6px 12px;
    border: 1.5px solid var(--gray-2);
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    background: var(--white);
    cursor: pointer;
    white-space: nowrap;
  }

  .filter-chip.active {
    border-color: var(--orange);
    background: var(--orange);
    color: var(--white);
  }

  .jobs-list { padding: 0 16px; }

  .job-card {
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--gray-2);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .job-card-header {
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--gray-1);
  }

  .job-wo {
    font-family: monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--black);
  }

  .job-date {
    font-size: 11px;
    color: var(--gray-3);
    margin-top: 2px;
  }

  .status-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .status-Completed { background: #e8f5e9; color: var(--green); }
  .status-Pending { background: #fff8e1; color: var(--amber); }
  .status-In-Progress { background: #e3f2fd; color: #1565c0; }
  .status-Waiting { background: #fce4ec; color: var(--red); }

  .job-card-body {
    padding: 12px 14px;
  }

  .job-customer {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .job-phone {
    font-size: 13px;
    color: var(--gray-3);
    margin-bottom: 8px;
  }

  .job-machine {
    display: inline-block;
    background: var(--black);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .job-complaint {
    font-size: 13px;
    color: var(--gray-3);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .job-card-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--gray-1);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .status-btn {
    padding: 7px 12px;
    border: 1.5px solid var(--gray-2);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    background: var(--white);
    cursor: pointer;
  }

  .status-btn:active { background: var(--gray-1); }
  .status-btn.primary { background: var(--orange); color: var(--white); border-color: var(--orange); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-3);
  }

  .empty-state h3 { font-size: 16px; color: var(--black); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--gray-2);
    margin: 12px 16px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--gray-2);
  }

  .summary-cell {
    background: var(--white);
    padding: 12px 8px;
    text-align: center;
  }

  .summary-cell .num {
    font-size: 22px;
    font-weight: 800;
    color: var(--black);
    line-height: 1;
  }

  .summary-cell .lbl {
    font-size: 10px;
    color: var(--gray-3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .pending-reason {
    font-size: 11px;
    color: var(--amber);
    font-weight: 600;
    margin-top: 4px;
  }

  .update-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    display: none;
  }

  .update-modal.open { display: flex; }

  .modal-sheet {
    background: var(--white);
    border-radius: 16px 16px 0 0;
    padding: 20px 16px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    width: 100%;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .modal-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .modal-opt {
    padding: 12px;
    border: 1.5px solid var(--gray-2);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    background: var(--white);
  }

  .modal-opt.selected { border-color: var(--orange); background: #fff4ef; }

  .pending-options { display: none; margin-bottom: 16px; }
  .pending-options.show { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .modal-close {
    width: 100%;
    padding: 13px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--black);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }

  .fab {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    right: 20px;
    width: 56px;
    height: 56px;
    background: var(--orange);
    color: var(--white);
    border-radius: 50%;
    border: none;
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(232,92,13,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
</style>
</head>
<body>

<header>
  <img src="../assets/logos/tagro-logo.png" alt="TAGRO" style="height:28px;">
</header>

<nav>
  <a href="index.html">Job Card</a>
  <a href="tracker.html" class="active">Tracker</a>
  <a href="config.html">Setup</a>
</nav>

<div class="search-bar">
  <input type="search" id="search" placeholder="Search by name, phone, serial, model..." oninput="renderJobs()">
</div>

<div class="filter-row">
  <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-chip" data-filter="Waiting" onclick="setFilter('Waiting', this)">Waiting</button>
  <button class="filter-chip" data-filter="In-Progress" onclick="setFilter('In-Progress', this)">In Progress</button>
  <button class="filter-chip" data-filter="Pending" onclick="setFilter('Pending', this)">Pending</button>
  <button class="filter-chip" data-filter="Completed" onclick="setFilter('Completed', this)">Completed</button>
</div>

<div class="summary-bar">
  <div class="summary-cell"><div class="num" id="sum-all">0</div><div class="lbl">Total</div></div>
  <div class="summary-cell"><div class="num" id="sum-active">0</div><div class="lbl">Active</div></div>
  <div class="summary-cell"><div class="num" id="sum-pending">0</div><div class="lbl">Pending</div></div>
  <div class="summary-cell"><div class="num" id="sum-done">0</div><div class="lbl">Done</div></div>
</div>

<div class="jobs-list" id="jobs-list"></div>

<!-- Status update modal -->
<div class="update-modal" id="update-modal">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-title">Update Status</div>
    <div class="modal-options">
      <button class="modal-opt" onclick="selectStatus('Waiting')">Waiting</button>
      <button class="modal-opt" onclick="selectStatus('In-Progress')">In Progress</button>
      <button class="modal-opt" onclick="selectStatus('Pending')">Pending</button>
      <button class="modal-opt" onclick="selectStatus('Completed')">Completed</button>
    </div>
    <div class="pending-options" id="pending-opts">
      <button class="modal-opt" onclick="selectPending('Parts awaited')">Parts awaited</button>
      <button class="modal-opt" onclick="selectPending('Customer approval')">Customer approval</button>
      <button class="modal-opt" onclick="selectPending('Outside work')">Outside work</button>
      <button class="modal-opt" onclick="selectPending('Staff unavailable')">Staff unavailable</button>
    </div>
    <button class="modal-close" onclick="closeModal()">Done</button>
  </div>
</div>

<a href="index.html" class="fab">+</a>

<div class="toast" id="toast"></div>

<script>
let allJobs = [];
let currentFilter = 'all';
let activeJobIdx = null;
let pendingReason = '';

function getToken() { return localStorage.getItem('dbx_token') || ''; }
function getConfig() {
  try { return JSON.parse(localStorage.getItem('tagro_config') || '{}'); } catch { return {}; }
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
}

async function loadJobs() {
  const token = getToken();
  const cfg = getConfig();

  // Load from localStorage first (instant)
  const local = JSON.parse(localStorage.getItem('tagro_jobs') || '[]');
  allJobs = local;
  updateSummary();
  renderJobs();

  // Then sync from Dropbox
  if (!token || !cfg.branch) return;
  try {
    const path = `/TAGRO-Service/${cfg.branch}/jobs.json`;
    const res = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${token}`,
        'Dropbox-API-Arg': JSON.stringify({ path })
      }
    });
    if (res.ok) {
      const jobs = await res.json();
      allJobs = jobs;
      localStorage.setItem('tagro_jobs', JSON.stringify(jobs));
      updateSummary();
      renderJobs();
    }
  } catch (e) {
    // Use local data
  }
}

function updateSummary() {
  const active = allJobs.filter(j => ['Waiting','In-Progress'].includes(j.status)).length;
  const pending = allJobs.filter(j => j.status === 'Pending').length;
  const done = allJobs.filter(j => j.status === 'Completed').length;
  document.getElementById('sum-all').textContent = allJobs.length;
  document.getElementById('sum-active').textContent = active;
  document.getElementById('sum-pending').textContent = pending;
  document.getElementById('sum-done').textContent = done;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderJobs();
}

function renderJobs() {
  const query = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('jobs-list');

  let filtered = allJobs.filter(j => {
    if (currentFilter !== 'all' && j.status !== currentFilter) return false;
    if (query) {
      const searchable = [
        j.customer?.name, j.customer?.phone, j.machine?.serialNo,
        j.machine?.model, j.workOrder
      ].join(' ').toLowerCase();
      if (!searchable.includes(query)) return false;
    }
    return true;
  }).reverse();

  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-state">
        <h3>${query ? 'No results' : 'No jobs yet'}</h3>
        <p>${query ? 'Try a different search' : 'Tap + to create a new job card'}</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map((job, i) => {
    const origIdx = allJobs.length - 1 - (allJobs.slice().reverse().indexOf(job));
    const statusClass = 'status-' + (job.status || 'Waiting').replace(' ', '-');
    return `
      <div class="job-card">
        <div class="job-card-header">
          <div>
            <div class="job-wo">${job.workOrder || '—'}</div>
            <div class="job-date">${formatDate(job.date)}</div>
          </div>
          <span class="status-badge ${statusClass}">${job.status || 'Waiting'}</span>
        </div>
        <div class="job-card-body">
          <div class="job-customer">${job.customer?.name || '—'}</div>
          <div class="job-phone">${job.customer?.phone || ''}</div>
          <span class="job-machine">${job.machine?.model || '—'}</span>
          ${job.machine?.serialNo ? `<span style="font-size:12px;color:var(--gray-3);margin-left:6px;">${job.machine.serialNo}</span>` : ''}
          <div class="job-complaint">${job.job?.complaint || 'No complaint recorded'}</div>
          ${job.pendingReason ? `<div class="pending-reason">⚠ ${job.pendingReason}</div>` : ''}
        </div>
        <div class="job-card-footer">
          <button class="status-btn primary" onclick="openModal(${origIdx})">Update status</button>
          ${job.customer?.phone ? `<a class="status-btn" href="tel:${job.customer.phone}">Call customer</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openModal(idx) {
  activeJobIdx = idx;
  const job = allJobs[idx];
  document.getElementById('modal-title').textContent = `${job.customer?.name || 'Job'} — ${job.machine?.model || ''}`;
  document.getElementById('pending-opts').classList.remove('show');
  document.getElementById('update-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('update-modal').classList.remove('open');
  activeJobIdx = null;
}

function selectStatus(status) {
  document.querySelectorAll('.modal-opt').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');

  if (status === 'Pending') {
    document.getElementById('pending-opts').classList.add('show');
  } else {
    document.getElementById('pending-opts').classList.remove('show');
    pendingReason = '';
    updateJobStatus(status, '');
  }
}

function selectPending(reason) {
  pendingReason = reason;
  document.querySelectorAll('#pending-opts .modal-opt').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
  updateJobStatus('Pending', reason);
}

async function updateJobStatus(status, reason) {
  if (activeJobIdx === null) return;

  allJobs[activeJobIdx].status = status;
  allJobs[activeJobIdx].pendingReason = reason || '';
  allJobs[activeJobIdx].statusUpdatedAt = new Date().toISOString();

  localStorage.setItem('tagro_jobs', JSON.stringify(allJobs));
  updateSummary();
  renderJobs();
  showToast(`Status updated to ${status}`);

  const token = getToken();
  const cfg = getConfig();
  if (token && cfg.branch) {
    try {
      const path = `/TAGRO-Service/${cfg.branch}/jobs.json`;
      await fetch('https://content.dropboxapi.com/2/files/upload', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/octet-stream',
          'Dropbox-API-Arg': JSON.stringify({ path, mode: 'overwrite', autorename: false })
        },
        body: JSON.stringify(allJobs, null, 2)
      });
    } catch {}
  }
}

// Close modal on backdrop click
document.getElementById('update-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadJobs();
</script>
</body>
</html>
